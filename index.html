<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カトレヤこども園　登降園管理</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #E3F2FD, #E8F5E9);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      max-width: 400px;
      width: 100%;
    }
    #startView .logo     { font-size: 48px; margin-bottom: 10px; }
    #startView .title    { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 4px; }
    #startView .subtitle { font-size: 12px; color: #999; margin-bottom: 24px; }
    #startBtn {
      background: #4472C4; color: white; border: none;
      border-radius: 16px; font-size: 20px; font-weight: bold;
      padding: 18px; width: 100%; cursor: pointer;
    }
    #cameraView { display: none; }
    #videoWrap {
      position: relative; width: 100%;
      border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 8px;
    }
    #video { width: 100%; display: block; max-height: 260px; object-fit: cover; }
    .scan-line {
      position: absolute; left: 0; right: 0; height: 3px;
      background: rgba(68,114,196,0.9);
      animation: scan 2s ease-in-out infinite;
    }
    @keyframes scan { 0%{top:5%} 50%{top:90%} 100%{top:5%} }
    #clock  { font-size: 40px; font-weight: bold; color: #ccc; margin: 8px 0; }
    #debug  {
      background: #f5f5f5; border-radius: 8px; padding: 10px;
      font-size: 11px; color: #666; text-align: left;
      margin-top: 8px; min-height: 60px; word-break: break-all;
    }
    #resultView { display: none; }
    #resultView .emoji    { font-size: 56px; margin-bottom: 8px; }
    #resultView .name     { font-size: 26px; font-weight: bold; color: #333; margin-bottom: 4px; }
    #resultView .greeting { font-size: 14px; color: #888; margin-bottom: 12px; }
    #resultView .badge {
      display: inline-block; color: white; font-size: 18px; font-weight: bold;
      padding: 8px 24px; border-radius: 50px; margin-bottom: 10px;
    }
    #resultView .time       { font-size: 24px; font-weight: bold; margin-bottom: 4px; }
    #resultView .class-name { font-size: 12px; color: #bbb; margin-bottom: 12px; }
    .timer-bar { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
    #timerFill { height: 100%; border-radius: 2px; }
    #errorView { display: none; }
    #errorView .e-emoji { font-size: 44px; margin-bottom: 8px; }
    #errorView .e-msg   { font-size: 13px; color: #666; line-height: 1.6; }
  </style>
</head>
<body>
<div class="card">
  <div id="startView">
    <div class="logo">🌸</div>
    <div class="title">カトレヤこども園</div>
    <div class="subtitle">登降園管理システム</div>
    <button id="startBtn" onclick="startSystem()">📷 開始</button>
  </div>
  <div id="cameraView">
    <div id="videoWrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div class="scan-line"></div>
    </div>
    <div id="clock"></div>
    <div id="debug">待機中
