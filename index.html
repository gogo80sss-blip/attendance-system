<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カトレヤこども園 最終テスト</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 20px; }
    #video { width: 100%; max-width: 400px; border: 2px solid #333; border-radius: 10px; }
    #debug { background: #333; color: #0f0; padding: 15px; margin-top: 10px; font-family: monospace; font-size: 12px; text-align: left; min-height: 100px; }
    #startBtn { padding: 20px; font-size: 20px; background: #4472C4; color: white; border: none; border-radius: 10px; width: 100%; cursor: pointer; }
    #resultView { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; padding-top:50px; z-index:100; }
  </style>
</head>
<body>

<div id="startView">
  <h1>🌸 カトレヤこども園</h1>
  <button id="startBtn" onclick="init()">📷 カメラ開始</button>
</div>

<div id="mainView" style="display:none;">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="debug">初期化中...</div>
  <button onclick="processId('099')" style="margin-top:20px; padding:10px; background:#ff4444; color:white; border:none; border-radius:5px;">テスト送信(099)</button>
</div>

<div id="resultView" id="resPanel">
  <h1 id="resName">読み込み中...</h1>
  <div id="resMsg" style="font-size:24px;"></div>
  <p>3秒後に戻ります</p>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzVc8sxELmKBLCu0NRLdukr7B2ydrdlGZbxMY68pKvLWPmpxSSEEh7d_ijRboJi3WBxKw/exec';
  let audioCtx = null;
  let processing = false;
  let count = 0;

  function log(msg) {
    document.getElementById('debug').innerHTML = msg + "<br>" + document.getElementById('debug').innerHTML;
  }

  async function init() {
    document.getElementById('startView').style.display = 'none';
    document.getElementById('mainView').style.display = 'block';
    
    // 音声の準備
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      const video = document.getElementById('video');
      video.srcObject = stream;
      // iPhone Safari向けの対策
      video.setAttribute("playsinline", true);
      video.play();
      log("カメラ起動完了。解析を開始します。");
      requestAnimationFrame(tick);
    } catch (err) {
      log("エラー: " + err.message);
    }
  }

  function tick() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    
    if (video.readyState === video.HAVE_ENOUGH_DATA && !processing) {
      count++;
      if (count % 30 === 0) log("解析中... [" + count + "]"); // 動きを確認するためのカウンター

      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);

      if (code) {
        log("QR検出！内容: " + code.data);
        // URLからIDを抽出
        const match = code.data.match(/[?&]id=([^&]+)/);
        const id = match ? match[1] : code.data;
        processId(id);
      }
    }
    requestAnimationFrame(tick);
  }

  async function processId(id) {
    if (processing) return;
    processing = true;
    log("ID: " + id + " をGASへ送信します...");

    try {
      const res = await fetch(GAS_URL + "?mode=result&id=" + id);
      const data = await res.json();
      
      if (data.error) {
        log("GASエラー: " + data.error);
        alert("エラー: " + data.error);
        processing = false;
      } else {
        showResult(data);
      }
    } catch (err) {
      log("通信エラー: " + err.message);
      alert("通信に失敗しました。");
      processing = false;
    }
  }

  function showResult(d) {
    document.getElementById('resName').innerText = d.name + " さん";
    document.getElementById('resMsg').innerText = d.type + "完了 (" + d.time + ")";
    document.getElementById('resultView').style.display = 'block';
    
    playTone(d.type);

    setTimeout(() => {
      document.getElementById('resultView').style.display = 'none';
      processing = false;
      log("スキャン再開");
    }, 3000);
  }

  function playTone(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    if (type === '登園') {
      osc.frequency.setValueAtTime(660, now);
      osc.frequency.exponentialRampToValueAtTime(1320, now + 0.4);
    } else {
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(440, now + 0.4);
    }
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    osc.start();
    osc.stop(now + 0.4);
  }
</script>
</body>
</html>
