<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カトレヤこども園 登降園管理</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root { --main-pink: #FFB7C5; --text-color: #5A4A42; }
    body { font-family: sans-serif; background: #FFF5F7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .container { width: 90%; max-width: 400px; background: white; border-radius: 40px; padding: 30px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    
    /* 【解決策】表示だけ左右反転（ミラー）させる */
    .video-wrap { position: relative; width: 100%; border-radius: 25px; overflow: hidden; border: 8px solid var(--main-pink); background: #000; }
    #video { width: 100%; display: block; transform: scaleX(-1); } 

    #btn { background: #FFB7C5; color: white; border: none; border-radius: 30px; padding: 18px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
    #msgOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    .res-card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 80%; }
  </style>
</head>
<body>

<div id="startView" class="container">
  <div style="font-size:60px;">🐣</div>
  <h2>カトレヤこども園</h2>
  <button id="btn" onclick="start()" disabled>読み込み中...</button>
</div>

<div id="scanView" class="container" style="display:none;">
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
  </div>
  <div style="margin-top:10px; font-weight:bold; color:var(--main-pink);">QRをみせてね♪</div>
  <canvas id="hiddenCanvas" style="display:none;"></canvas>
  <button onclick="location.reload()" style="margin-top:15px; font-size:12px; color:#ccc; border:none; background:none; text-decoration:underline;">やりなおす</button>
</div>

<div id="msgOverlay">
  <div class="res-card">
    <div id="resEmoji" style="font-size:80px;">🌸</div>
    <div id="resName" style="font-size:26px; font-weight:bold;">〇〇 さん</div>
    <div id="resType" style="color:white; padding:10px 30px; border-radius:50px; margin-top:10px; display:inline-block; font-weight:bold;">登園完了</div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzVc8sxELmKBLCu0NRLdukr7B2ydrdlGZbxMY68pKvLWPmpxSSEEh7d_ijRboJi3WBxKw/exec';
  let audioCtx = null;
  let isProcessing = false;

  // ライブラリ確認
  setInterval(() => {
    if (typeof jsQR !== 'undefined') {
      const b = document.getElementById('btn');
      if(b.disabled) { b.disabled = false; b.innerText = "📷 受付をはじめる"; }
    }
  }, 500);

  async function start() {
    document.getElementById('startView').style.display = 'none';
    document.getElementById('scanView').style.display = 'block';
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        setInterval(analyze, 300);
      };
    } catch(e) { alert("カメラが使えません"); }
  }

  function analyze() {
    if (isProcessing) return;
    const video = document.getElementById('video');
    const canvas = document.getElementById('hiddenCanvas');
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    // 【解決策の核心】
    // 描画時に反転処理を一切入れないことで、
    // カメラが本来撮影している「正しい向き」の画像として解析に回す
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imgData.data, imgData.width, imgData.height);

    if (code) {
      const id = code.data.match(/[?&]id=([^&]+)/)?.[1] || code.data;
      sendData(id);
    }
  }

  async function sendData(id) {
    isProcessing = true;
    try {
      const res = await fetch(GAS_URL + "?mode=result&id=" + id);
      const data = await res.json();
      if (!data.error) {
        showResult(data);
        playPiyo(data.type);
      } else { alert(data.error); isProcessing = false; }
    } catch(e) { alert("通信エラー"); isProcessing = false; }
  }

  function showResult(d) {
    const isLogin = d.type === '登園';
    document.getElementById('resEmoji').innerText = isLogin ? '🐣' : '🏠';
    document.getElementById('resName').innerText = d.name + (d.gender === '男' ? ' くん' : ' ちゃん');
    const t = document.getElementById('resType');
    t.innerText = d.type + "完了！";
    t.style.background = isLogin ? '#FF9E2C' : '#7BC67B';
    document.getElementById('msgOverlay').style.display = 'flex';
    setTimeout(() => { document.getElementById('msgOverlay').style.display = 'none'; isProcessing = false; }, 3000);
  }

  function playPiyo(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const p = (t) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(2000, t);
      o.frequency.exponentialRampToValueAtTime(2500, t + 0.05);
      g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.2, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + 0.1);
    };
    if(type === '登園') { p(audioCtx.currentTime); p(audioCtx.currentTime + 0.15); }
    else { p(audioCtx.currentTime); p(audioCtx.currentTime + 0.4); }
  }
</script>
</body>
</html>
