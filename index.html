<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カトレヤこども園 登降園管理</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root { --main-pink: #FFB7C5; --text-color: #5A4A42; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #FFF5F7;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    .container {
      width: 95%; max-width: 400px; background: white;
      border-radius: 40px; padding: 20px; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .video-wrap {
      position: relative; width: 100%;
      border-radius: 20px; overflow: hidden;
      border: 6px solid var(--main-pink);
      background: #000; aspect-ratio: 1/1;
    }
    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .guide-wrap {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .guide-box {
      width: 65%; height: 65%;
      border: 3px solid rgba(255,255,255,0.9);
      border-radius: 12px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
      position: relative;
    }
    .guide-box::before, .guide-box::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: white;
      border-style: solid;
    }
    .guide-box::before {
      top: -3px; left: -3px;
      border-width: 4px 0 0 4px;
      border-radius: 4px 0 0 0;
    }
    .guide-box::after {
      bottom: -3px; right: -3px;
      border-width: 0 4px 4px 0;
      border-radius: 0 0 4px 0;
    }
    .guide-label {
      position: absolute;
      bottom: -45px; left: 50%;
      transform: translateX(-50%);
      color: white; font-size: 12px;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      font-weight: bold;
    }
    .scan-line {
      position: absolute;
      left: 10%; right: 10%;
      height: 2px;
      background: rgba(255, 183, 197, 0.9);
      box-shadow: 0 0 6px rgba(255, 183, 197, 0.8);
      animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%   { top: 15%; }
      50%  { top: 82%; }
      100% { top: 15%; }
    }
    #btn {
      background: #FFB7C5; color: white; border: none;
      border-radius: 30px; padding: 18px; width: 100%;
      font-size: 18px; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 0 #E57381; margin-top: 10px;
    }
    #btn:disabled { background: #ddd; box-shadow: none; }
    #stopBtn {
      background: white; color: #E57381;
      border: 2px solid #FFB7C5;
      border-radius: 30px; padding: 10px; width: 100%;
      font-size: 14px; font-weight: bold; cursor: pointer;
      margin-top: 12px;
    }
    #manualLink {
      background: none; border: none;
      color: #bbb; font-size: 12px;
      margin-top: 18px; cursor: pointer;
      text-decoration: underline;
    }
    .manual-select {
      width: 100%; padding: 16px;
      font-size: 20px; text-align: center;
      border: 2px solid #FFB7C5; border-radius: 16px;
      margin-top: 14px; outline: none;
      color: var(--text-color); background: white;
      appearance: none; -webkit-appearance: none;
    }
    .manual-select:focus { border-color: #E57381; }
    .manual-select:disabled { border-color: #eee; color: #ccc; background: #fafafa; }
    #manualSendBtn {
      background: #FFB7C5; color: white; border: none;
      border-radius: 30px; padding: 16px; width: 100%;
      font-size: 17px; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 0 #E57381; margin-top: 16px;
    }
    #manualBackBtn {
      background: white; color: #E57381;
      border: 2px solid #FFB7C5;
      border-radius: 30px; padding: 10px; width: 100%;
      font-size: 14px; font-weight: bold; cursor: pointer;
      margin-top: 12px;
    }
    #statusMsg {
      margin-top: 12px; font-size: 13px;
      color: var(--main-pink); font-weight: bold; min-height: 20px;
    }
    #msgOverlay {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.97);
      z-index: 1000;
      flex-direction: column; align-items: center; justify-content: center;
    }
    .res-card {
      background: white; border-radius: 30px; padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 82%; text-align: center;
    }
    #resEmoji { font-size: 80px; margin-bottom: 10px; }
    #resName  { font-size: 26px; font-weight: bold; margin-bottom: 14px; }
    #resType  {
      color: white; padding: 12px 32px; border-radius: 50px;
      display: inline-block; font-weight: bold; font-size: 20px;
    }
    .timer-bar  { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 20px; }
    #timerFill  { height: 100%; border-radius: 2px; }
  </style>
</head>
<body>

<div id="startView" class="container">
  <div style="font-size:60px; margin-bottom:10px;">🌸</div>
  <h2 style="color:var(--text-color); margin-bottom:6px;">カトレヤこども園</h2>
  <div style="font-size:13px; color:#aaa; margin-bottom:24px;">登降園管理システム</div>
  <button id="btn" onclick="start()" disabled>準備中...</button>
  <button id="manualLink" onclick="openManual()">✏️ 手入力打刻（せんせい用）</button>
</div>

<div id="manualView" class="container" style="display:none;">
  <div style="font-size:48px; margin-bottom:10px;">✏️</div>
  <h2 style="color:var(--text-color); margin-bottom:6px;">手入力打刻</h2>
  <div style="font-size:13px; color:#aaa;">QRが読めないときの救済用です</div>
  <select id="classSelect" class="manual-select" onchange="onClassChange()">
    <option value="">クラスをえらぶ</option>
  </select>
  <select id="nameSelect" class="manual-select" disabled>
    <option value="">なまえをえらぶ</option>
  </select>
  <button id="manualSendBtn" onclick="manualPunch()">🕒 打刻する</button>
  <button id="manualBackBtn" onclick="closeManual()">← もどる</button>
</div>

<div id="scanView" class="container" style="display:none;">
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="guide-wrap">
      <div class="guide-box">
        <div class="scan-line"></div>
        <div class="guide-label">離して枠にQRを合わせてね 🐥</div>
      </div>
    </div>
  </div>
  <canvas id="hiddenCanvas" style="display:none;"></canvas>
  <div id="statusMsg">受付中 🐣</div>
  <button id="stopBtn" onclick="stopScan()">✖ 受付をおわる</button>
</div>

<div id="msgOverlay">
  <div class="res-card">
    <div id="resEmoji">🐣</div>
    <div id="resName">確認中...</div>
    <div id="resType">読み取りました！</div>
    <div class="timer-bar"><div id="timerFill"></div></div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzVc8sxELmKBLCu0NRLdukr7B2ydrdlGZbxMY68pKvLWPmpxSSEEh7d_ijRboJi3WBxKw/exec';

  const ANIMAL_SOUNDS = [
    'sounds/グロッケングリッサンド2.mp3',
    'sounds/選択1.mp3',
    'sounds/「バイバーイ」.mp3'
  ];
  const soundBuffers = {};



  const RESULT_DISPLAY_MS    = 2000;   // 結果表示の時間（旧: 3000ms）
  const SAME_ID_COOLDOWN_MS  = 10000;  // 同じQRの連続打刻を防ぐ時間
  const WARMUP_INTERVAL_MS   = 240000; // GASを温めておく間隔（4分）

  let audioCtx    = null;
  let isProcessing = false;
  let scanning     = false;  // 受付中フラグ（終了ボタンでfalseに）
  let currentStream = null;  // カメラのストリーム（終了時に停止する）
  let scanTimer     = null;  // jsQR用のsetInterval ID
  const lastScanTimes = {};  // id → 最後に打刻した時刻（二重打刻防止）

  // 【高速化】GASは放置すると初回アクセスが遅くなるため、
  // 定期的に空アクセスしてサーバーを温めておく
  function warmUpServer() {
    fetch(GAS_URL + '?mode=warmup').catch(() => {});
  }
  warmUpServer();
  setInterval(warmUpServer, WARMUP_INTERVAL_MS);

  const btnCheckTimer = setInterval(() => {
    if (typeof jsQR !== 'undefined') {
      const b = document.getElementById('btn');
      if (b.disabled) { b.disabled = false; b.innerText = "📷 受付をはじめる"; }
      clearInterval(btnCheckTimer);
    }
  }, 300);

  // 音声の初期化（スキャン・手入力の両方から使う）
  async function initAudio() {
    // AudioContextの生成（再開時は使い回す）
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // 【重要】iPhone/Androidの音声ロックを解除するための「空再生」
    const silentBuf = audioCtx.createBuffer(1, 1, 22050);
    const node = audioCtx.createBufferSource();
    node.buffer = silentBuf;
    node.connect(audioCtx.destination);
    node.start(0);
    if (audioCtx.state === 'suspended') audioCtx.resume();

    // 音声の読み込み（初回のみ）
    if (Object.keys(soundBuffers).length === 0) {
      for (const path of ANIMAL_SOUNDS) {
        try {
          const soundUrl = new URL(path, window.location.href).href;
          const resp = await fetch(soundUrl);
          if (!resp.ok) throw new Error('404 Not Found');
          const arrayBuffer = await resp.arrayBuffer();
          soundBuffers[path] = await audioCtx.decodeAudioData(arrayBuffer);
          console.log("読み込み成功:", path);
        } catch (e) {
          console.error("読み込み失敗:", path, e);
        }
      }
    }
  }

  // 【追加】手入力打刻（救済用）: クラス→名前の2段プルダウン
  // 名簿はGAS（本番スプレッドシートの児童マスタ）から取得する。
  // 個人情報なのでHTMLには埋め込まない。
  let rosterData = null;  // {classes: [...], roster: [{id, n, c}, ...]}

  async function loadRoster() {
    if (rosterData) return rosterData;
    const resp = await fetch(GAS_URL + '?mode=list');
    const data = await resp.json();
    if (!data || !Array.isArray(data.roster)) throw new Error('名簿の形式が不正');
    rosterData = data;
    return rosterData;
  }

  async function openManual() {
    initAudio();  // 完了音を鳴らせるように準備（失敗しても打刻はできる）
    document.getElementById('startView').style.display  = 'none';
    document.getElementById('manualView').style.display = 'block';

    const cs = document.getElementById('classSelect');
    if (cs.options.length > 1) return;  // 名簿は取得済み

    cs.options[0].text = '名簿をよみこみ中...';
    cs.disabled = true;
    try {
      const data = await loadRoster();
      const classes = data.classes || [...new Set(data.roster.map(r => r.c))];
      classes.forEach(c => cs.add(new Option(c, c)));
      cs.options[0].text = 'クラスをえらぶ';
      cs.disabled = false;
    } catch (e) {
      console.error('名簿取得エラー:', e);
      cs.options[0].text = '名簿を取得できません（通信を確認）';
    }
  }

  function closeManual() {
    document.getElementById('manualView').style.display = 'none';
    document.getElementById('startView').style.display  = 'block';
  }

  // クラスを選ぶと、そのクラスの子だけ名前プルダウンに出す
  function onClassChange() {
    const c  = document.getElementById('classSelect').value;
    const ns = document.getElementById('nameSelect');
    ns.innerHTML = '<option value="">なまえをえらぶ</option>';
    if (c && rosterData) {
      rosterData.roster.filter(r => r.c === c).forEach(r => ns.add(new Option(r.n, r.id)));
    }
    ns.disabled = !c;
  }

  function manualPunch() {
    const ns = document.getElementById('nameSelect');
    const id = ns.value;
    if (!id) { ns.focus(); return; }
    sendData(id);  // QR読取と同じ処理（結果表示・二重打刻防止もそのまま効く）
    ns.value = '';  // 次の子のために名前選択をリセット（クラスは残す）
  }

  async function start() {
    document.getElementById('startView').style.display = 'none';
    document.getElementById('scanView').style.display  = 'block';
    scanning = true;

    await initAudio();

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      currentStream = stream;  // 終了ボタンで止められるように保持
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.onloadedmetadata = async () => {
        video.play();
        // 【修正】getCapabilities未対応ブラウザ（Firefox等）で例外が出ると
        // QR検出が一切始まらなくなるため、try/catchで保護する
        try {
          const track = stream.getVideoTracks()[0];
          if (typeof track.getCapabilities === 'function') {
            const caps = track.getCapabilities();
            if (caps.zoom) {
              const zoomVal = Math.min(caps.zoom.max, caps.zoom.min + 0.8);
              await track.applyConstraints({ advanced: [{ zoom: zoomVal }] });
            }
          }
        } catch (e) { console.warn("ズーム設定はスキップしました:", e); }
        if ('BarcodeDetector' in window) {
          document.getElementById('statusMsg').textContent = '受付中 🐣 [高速モード]';
          startBarcodeDetector(video);
        } else {
          document.getElementById('statusMsg').textContent = '受付中 🐣';
          if (scanTimer) clearInterval(scanTimer);
          scanTimer = setInterval(analyze, 150);
        }
      };
    } catch(e) {
      alert("カメラの起動に失敗しました。");
    }
  }

  async function startBarcodeDetector(video) {
    const detector = new BarcodeDetector({ formats: ['qr_code'] });
    async function detect() {
      if (!scanning) return;  // 終了ボタンでループを止める
      if (!isProcessing && video.readyState === video.HAVE_ENOUGH_DATA) {
        try {
          const codes = await detector.detect(video);
          if (codes.length > 0) {
            const url = codes[0].rawValue;
            const id  = url.match(/[?&]id=([^&]+)/)?.[1] || url;
            if (id) sendData(id);
          }
        } catch(e) {}
      }
      requestAnimationFrame(detect);
    }
    detect();
  }

  // 【追加】終了ボタン: カメラとスキャンを止めて最初の画面に戻る
  function stopScan() {
    scanning = false;
    if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
      currentStream = null;
    }
    const video = document.getElementById('video');
    video.srcObject = null;
    isProcessing = false;
    document.getElementById('msgOverlay').style.display = 'none';
    document.getElementById('scanView').style.display   = 'none';
    document.getElementById('startView').style.display  = 'block';
  }

  function analyze() {
    if (isProcessing) return;
    const video = document.getElementById('video');
    const canvas = document.getElementById('hiddenCanvas');
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    canvas.width = 640; canvas.height = 480;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });
    if (code) {
      const id = code.data.match(/[?&]id=([^&]+)/)?.[1] || code.data;
      if (id) sendData(id);
    }
  }

  function sendData(id) {
    if (isProcessing) return;

    // 【修正】同じQRを短時間に2回読んでも打刻しない（二重打刻防止）
    const now = Date.now();
    if (lastScanTimes[id] && (now - lastScanTimes[id]) < SAME_ID_COOLDOWN_MS) return;
    lastScanTimes[id] = now;

    isProcessing = true;
    
    // 【1回目】即時音
    playPiyo('sounds/選択1.mp3');
    
    document.getElementById('resEmoji').innerText = '🐣';
    document.getElementById('resName').innerText  = '確認中...';
    const t = document.getElementById('resType');
    t.innerText = '読み取りました！';
    t.style.background = '#4472C4';

    const fill = document.getElementById('timerFill');
    fill.style.background = '#4472C4';
    fill.style.width = '100%';
    fill.style.transition = 'none';

    document.getElementById('msgOverlay').style.display = 'flex';
    setTimeout(() => {
      fill.style.transition = 'width 3s linear';
      fill.style.width = '0%';
    }, 50);

    fetch(GAS_URL + "?mode=result&id=" + id)
      .then(r => r.json())
      .then(data => {
        if (!data.error) {
          const typeLabel = data.type ? data.type.trim() : "";
          const isLogin = typeLabel === '登園';

          document.getElementById('resEmoji').innerText = isLogin ? '🐣' : '🏠';
          document.getElementById('resName').innerText  = data.name + (data.gender === '男' ? ' くん' : ' ちゃん');
          t.innerText = typeLabel + '完了！';
          t.style.background = isLogin ? '#FF9E2C' : '#7BC67B';
          fill.style.background = isLogin ? '#FF9E2C' : '#7BC67B';

          // 【2回目】確定音
          if (typeLabel === '降園') {
            playPiyo('sounds/「バイバーイ」.mp3');
          } else {
            // 登園、またはその他の判定
            playPiyo('sounds/グロッケングリッサンド2.mp3');
          }
        } else {
          // 【修正】エラー時も画面に表示する（以前は無反応のまま消えるだけだった）
          document.getElementById('resEmoji').innerText = '❓';
          document.getElementById('resName').innerText  = '登録が見つかりません';
          t.innerText = 'せんせいに聞いてね';
          t.style.background = '#E57381';
          fill.style.background = '#E57381';
          delete lastScanTimes[id];  // すぐ再挑戦できるようにする
        }
      })
      .catch(e => { 
        console.error("エラー詳細:", e); 
        document.getElementById('resEmoji').innerText = '😢';
        document.getElementById('resName').innerText  = '通信エラー';
        t.innerText = 'もう一度かざしてね';
        t.style.background = '#E57381';
        delete lastScanTimes[id];  // すぐ再挑戦できるようにする
      })
      .finally(() => {
        // タイマーバーを結果表示時間に合わせてリスタート
        fill.style.transition = 'none';
        fill.style.width = '100%';
        setTimeout(() => {
          fill.style.transition = 'width ' + RESULT_DISPLAY_MS + 'ms linear';
          fill.style.width = '0%';
        }, 30);
        // 【高速化】結果が出たら短時間で次の受付へ（旧: 3000ms → 2000ms）
        // 同じ子の二重打刻はクールダウンで防いでいるので、次の子はすぐ読める
        setTimeout(() => {
          document.getElementById('msgOverlay').style.display = 'none';
          isProcessing = false;
        }, RESULT_DISPLAY_MS);
      });
  }

  function playPiyo(soundPath) {
    if (!audioCtx) return;
    // 常に最新の状態をチェック
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(() => playNow(soundPath));
    } else {
      playNow(soundPath);
    }
  }

 function playNow(soundPath) {
    // 読み込み時と同じ形式でキーを指定する
    const buffer = soundBuffers[soundPath]; 
    
    if (!buffer) {
        // デバッグ用：どのパスで失敗しているかコンソールに出す
        console.warn("音源が見つかりません。登録されているキー:", Object.keys(soundBuffers));
        console.warn("要求されたパス:", soundPath);
        return;
    }
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
  }
</script>
</body>
</html>
