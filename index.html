<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カトレヤこども園　登降園管理</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #E3F2FD, #E8F5E9);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      max-width: 400px;
      width: 100%;
    }
    #startView .logo     { font-size: 48px; margin-bottom: 10px; }
    #startView .title    { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 4px; }
    #startView .subtitle { font-size: 12px; color: #999; margin-bottom: 24px; }
    #startBtn {
      background: #4472C4; color: white; border: none;
      border-radius: 16px; font-size: 20px; font-weight: bold;
      padding: 18px; width: 100%; cursor: pointer;
    }
    #cameraView { display: none; }
    #videoWrap {
      position: relative; width: 100%;
      border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 8px;
    }
    #video { width: 100%; display: block; max-height: 260px; object-fit: cover; }
    .scan-line {
      position: absolute; left: 0; right: 0; height: 3px;
      background: rgba(68,114,196,0.9);
      animation: scan 2s ease-in-out infinite;
    }
    @keyframes scan { 0%{top:5%} 50%{top:90%} 100%{top:5%} }
    #clock  { font-size: 40px; font-weight: bold; color: #ccc; margin: 8px 0; }
    #debug  {
      background: #f5f5f5; border-radius: 8px; padding: 10px;
      font-size: 11px; color: #666; text-align: left;
      margin-top: 8px; min-height: 60px; word-break: break-all;
    }
    #resultView { display: none; }
    #resultView .emoji    { font-size: 56px; margin-bottom: 8px; }
    #resultView .name     { font-size: 26px; font-weight: bold; color: #333; margin-bottom: 4px; }
    #resultView .greeting { font-size: 14px; color: #888; margin-bottom: 12px; }
    #resultView .badge {
      display: inline-block; color: white; font-size: 18px; font-weight: bold;
      padding: 8px 24px; border-radius: 50px; margin-bottom: 10px;
    }
    #resultView .time       { font-size: 24px; font-weight: bold; margin-bottom: 4px; }
    #resultView .class-name { font-size: 12px; color: #bbb; margin-bottom: 12px; }
    .timer-bar { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
    #timerFill { height: 100%; border-radius: 2px; }
    #errorView { display: none; }
    #errorView .e-emoji { font-size: 44px; margin-bottom: 8px; }
    #errorView .e-msg   { font-size: 13px; color: #666; line-height: 1.6; }
  </style>
</head>
<body>
<div class="card">
  <div id="startView">
    <div class="logo">🌸</div>
    <div class="title">カトレヤこども園</div>
    <div class="subtitle">登降園管理システム</div>
    <button id="startBtn" onclick="startSystem()">📷 開始</button>
  </div>
  <div id="cameraView">
    <div id="videoWrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div class="scan-line"></div>
    </div>
    <div id="clock"></div>
    <div id="debug">待機中... QRをかざしてください</div>
  </div>
  <div id="resultView">
    <div class="emoji"   id="resEmoji"></div>
    <div class="name"    id="resName"></div>
    <div class="greeting" id="resGreeting"></div>
    <div class="badge"   id="resBadge"></div>
    <div class="time"    id="resTime"></div>
    <div class="class-name" id="resClass"></div>
    <div class="timer-bar"><div id="timerFill"></div></div>
  </div>
  <div id="errorView">
    <div class="e-emoji">⚠️</div>
    <div class="e-msg" id="errMsg"></div>
  </div>
</div>
<script>
  const GAS_URL  = 'https://script.google.com/macros/s/AKfycbzVc8sxELmKBLCu0NRLdukr7B2ydrdlGZbxMY68pKvLWPmpxSSEEh7d_ijRboJi3WBxKw/exec';
  let audioCtx   = null;
  let processing = false;
  let lastId     = '';
  let lastTime   = 0;
  let timerID    = null;
  let frameCount = 0;

  function log(msg) {
    const el = document.getElementById('debug');
    if (el) el.textContent = msg;
    console.log(msg);
  }

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const el = document.getElementById('clock');
    if (el) el.textContent = h + ':' + m;
  }
  setInterval(updateClock, 1000);

  async function startSystem() {
    log('開始ボタン押下');
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.001, audioCtx.currentTime);
      o.start(); o.stop(audioCtx.currentTime + 0.01);
      log('音の許可OK');
    } catch(e) { log('音エラー: ' + e.message); }

    document.getElementById('startView').style.display  = 'none';
    document.getElementById('cameraView').style.display = 'block';
    updateClock();

    try {
      log('カメラ起動中...');
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      await video.play();
      log('カメラOK！QRをかざしてください');
      requestAnimationFrame(scanLoop);
    } catch(e) {
      log('カメラエラー: ' + e.message);
      alert('カメラの起動に失敗しました\n' + e.message);
    }
  }

  // BarcodeDetector対応チェック
  const hasBarcodeDetector = 'BarcodeDetector' in window;

  async function scanLoop() {
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    frameCount++;

    if (frameCount % 60 === 0) {
      log('スキャン中... フレーム:' + frameCount + (hasBarcodeDetector ? ' [BD]' : ' [jsQR]'));
    }

    if (video.readyState === video.HAVE_ENOUGH_DATA && !processing) {

      if (hasBarcodeDetector) {
        // BarcodeDetector方式（Android Chrome推奨）
        try {
          const detector = new BarcodeDetector({ formats: ['qr_code'] });
          const codes = await detector.detect(video);
          if (codes.length > 0) {
            const url = codes[0].rawValue;
            log('QR検出(BD)！: ' + url);
            handleQRCode(url);
          }
        } catch(e) {
          log('BDエラー: ' + e.message);
        }
      } else {
        // jsQR方式（フォールバック）
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          log('QR検出(jsQR)！: ' + code.data);
          handleQRCode(code.data);
        }
      }
    }
    requestAnimationFrame(scanLoop);
  }

  function handleQRCode(url) {
    const now   = Date.now();
    const match = url.match(/[?&]id=(\d+)/);
    if (match) {
      const id = match[1];
      if (id !== lastId || now - lastTime > 3000) {
        lastId = id; lastTime = now;
        log('ID=' + id + ' GASに送信中...');
        processId(id);
      } else {
        log('同じQR待機中: ' + id);
      }
    } else {
      log('IDなし: ' + url);
    }
  }

  function processId(id) {
    processing = true;
    fetch(GAS_URL + '?mode=result&id=' + id)
      .then(r => { log('レスポンス: ' + r.status); return r.json(); })
      .then(data => {
        log('受信: ' + JSON.stringify(data));
        if (data.error) showError(data.error);
        else showResult(data);
      })
      .catch(err => {
        log('通信エラー: ' + err.message);
        showError('通信エラー: ' + err.message);
      });
  }

  function showResult(d) {
    const isLogin   = d.type === '登園';
    const accent    = isLogin ? '#FF9800' : '#4CAF50';
    const honorific = d.gender === '男' ? 'くん' : 'ちゃん';
    document.getElementById('resEmoji').textContent      = isLogin ? '🌸' : '🏠';
    document.getElementById('resName').textContent       = d.name + ' ' + honorific;
    document.getElementById('resGreeting').textContent   = isLogin ? 'おはようございます！' : 'また明日ね！';
    document.getElementById('resBadge').textContent      = d.type + 'しました ✅';
    document.getElementById('resBadge').style.background = accent;
    document.getElementById('resTime').textContent       = d.time;
    document.getElementById('resTime').style.color       = accent;
    document.getElementById('resClass').textContent      = d.cls + '（' + d.grade + '）';
    const fill = document.getElementById('timerFill');
    fill.style.background = accent; fill.style.width = '100%'; fill.style.transition = 'none';
    document.getElementById('cameraView').style.display = 'none';
    document.getElementById('errorView').style.display  = 'none';
    document.getElementById('resultView').style.display = 'block';
    setTimeout(() => { fill.style.transition = 'width 3s linear'; fill.style.width = '0%'; }, 50);
    playSound(d.gender, d.type);
    if (timerID) clearTimeout(timerID);
    timerID = setTimeout(showCamera, 3000);
  }

  function showCamera() {
    document.getElementById('resultView').style.display = 'none';
    document.getElementById('errorView').style.display  = 'none';
    document.getElementById('cameraView').style.display = 'block';
    processing = false;
    log('カメラ待機中...');
    updateClock();
  }

  function showError(msg) {
    document.getElementById('errMsg').textContent        = msg;
    document.getElementById('cameraView').style.display  = 'none';
    document.getElementById('resultView').style.display  = 'none';
    document.getElementById('errorView').style.display   = 'block';
    if (timerID) clearTimeout(timerID);
    timerID = setTimeout(showCamera, 3000);
  }

  function playSound(gender, type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    let freq1, freq2;
    if      (gender==='男' && type==='登園') { freq1=440; freq2=660; }
    else if (gender==='女' && type==='登園') { freq1=660; freq2=880; }
    else if (gender==='男' && type==='降園') { freq1=392; freq2=523; }
    else                                      { freq1=523; freq2=698; }
    const now=audioCtx.currentTime;
    const o1=audioCtx.createOscillator(), o2=audioCtx.createOscillator(), gn=audioCtx.createGain();
    o1.connect(gn); o2.connect(gn); gn.connect(audioCtx.destination);
    o1.type=o2.type='sine';
    o1.frequency.value=freq1; o2.frequency.value=freq2;
    gn.gain.setValueAtTime(0.3,now);
    gn.gain.exponentialRampToValueAtTime(0.001,now+0.8);
    o1.start(now); o1.stop(now+0.4);
    o2.start(now+0.25); o2.stop(now+0.8);
  }
</script>
</body>
</html>
