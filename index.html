<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カトレヤこども園 確定版</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 20px; background: #f0f0f0; text-align: center; }
    #video { width: 100%; max-width: 400px; background: #000; border-radius: 10px; }
    #debug { background: #222; color: #0f0; padding: 10px; margin-top: 10px; text-align: left; font-size: 11px; min-height: 100px; white-space: pre-wrap; }
    #btn { padding: 20px; font-size: 20px; width: 100%; background: #4472C4; color: white; border: none; border-radius: 10px; }
    /* 通知用オーバーレイ */
    #msgOverlay { 
      display: none; position: fixed; top: 20%; left: 10%; width: 80%; 
      background: rgba(0,0,0,0.8); color: white; padding: 20px; 
      border-radius: 15px; font-size: 24px; font-weight: bold; z-index: 1000; 
    }
  </style>
</head>
<body>

<div id="startView">
  <h2>🌸 カトレヤこども園</h2>
  <button id="btn" onclick="start()" disabled>準備中...</button>
</div>

<div id="scanView" style="display:none;">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="msgOverlay"></div>
  <div id="debug">スキャン待機中...</div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzVc8sxELmKBLCu0NRLdukr7B2ydrdlGZbxMY68pKvLWPmpxSSEEh7d_ijRboJi3WBxKw/exec';
  let audioCtx = null;
  let isProcessing = false;

  // ライブラリ読み込みチェック
  const checkLib = setInterval(() => {
    if (typeof jsQR !== 'undefined') {
      clearInterval(checkLib);
      const btn = document.getElementById('btn');
      btn.disabled = false; btn.innerText = "📷 スキャン開始";
    }
  }, 500);

  async function start() {
    document.getElementById('startView').style.display = 'none';
    document.getElementById('scanView').style.display = 'block';
    
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        setInterval(analyze, 300); // 0.3秒間隔で解析
      };
    } catch(e) { alert("カメラ起動失敗"); }
  }

  function analyze() {
    if (isProcessing) return;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imgData.data, imgData.width, imgData.height);

    if (code) {
      const id = code.data.match(/[?&]id=([^&]+)/)?.[1] || code.data;
      sendData(id);
    }
  }

  async function sendData(id) {
    isProcessing = true;
    showStatus("送信中...");

    try {
      const res = await fetch(GAS_URL + "?mode=result&id=" + id);
      const data = await res.json();
      
      if (data.error) {
        showStatus("エラー: " + data.error, 3000);
      } else {
        showStatus(data.name + " さん\n" + data.type + "完了！", 3000);
        playBell();
      }
    } catch(e) {
      showStatus("通信エラー", 3000);
    }
    
    // 3秒後にスキャンを強制再開（ここが重要）
    setTimeout(() => {
      isProcessing = false;
      document.getElementById('msgOverlay').style.display = 'none';
    }, 3000);
  }

  function showStatus(txt, duration = 0) {
    const overlay = document.getElementById('msgOverlay');
    overlay.innerText = txt;
    overlay.style.display = 'block';
  }

  function playBell() {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
  }
</script>
</body>
</html>
